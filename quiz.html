<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz – Combate à Dengue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="./src/style.css">
</head>

<body class="bg-light">

<div class="container mt-5 mb-5">
  <div class="card shadow-lg">
    <div class="card-body">

      <!-- TÍTULO DO QUIZ -->
      <h2 class="text-center mb-2">🦟 Quiz Educativo – Dengue</h2>
      <p class="text-center text-muted mb-4">
        Teste seus conhecimentos sobre transmissão, sintomas, tratamento e prevenção da dengue.
      </p>

      <!-- QUIZ -->
      <div id="quiz">
        <h5 id="pergunta" class="mb-3"></h5>
        <div id="opcoes" class="d-grid gap-2"></div>
      </div>

      <!-- FEEDBACK -->
      <div id="feedback" class="mt-3 fw-bold text-center"></div>

      <!-- BOTÃO PRÓXIMA -->
      <div class="text-center">
        <button id="proxima" class="btn btn-success mt-4 d-none">
          Próxima pergunta
        </button>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
